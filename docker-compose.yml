services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_only
      MYSQL_DATABASE: we_project
      MYSQL_USER: weapp
      MYSQL_PASSWORD: weapp_dev
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_dev_only"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s
